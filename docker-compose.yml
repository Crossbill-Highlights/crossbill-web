# Deployment sample config
services:
  postgres:
    image: postgres:18-alpine
    container_name: crossbill-postgres
    restart: unless-stopped
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: crossbill
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crossbill_secure_password}
      POSTGRES_DB: crossbill
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crossbill"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker
    networks:
      - crossbill-network

  app:
    image: tumetsu/crossbill:latest
    container_name: crossbill-app
    restart: unless-stopped
    pull_policy: always
    env_file: .env
    ports:
      - "8000:8000"
    environment:
      # Refer to all possible environment variables in /.env.example with explanations!
      DATABASE_URL: postgresql://crossbill:${POSTGRES_PASSWORD:-crossbill_secure_password}@postgres:5432/crossbill
      ENVIRONMENT: production
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CORS_ORIGINS: '["https://yourdomain.com"]'
      SECRET_KEY: ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: 15
      REFRESH_TOKEN_EXPIRE_DAYS: 30
      REFRESH_TOKEN_SECRET_KEY: ${REFRESH_TOKEN_SECRET_KEY}
      COOKIE_SECURE: true
      ALLOW_USER_REGISTRATIONS: false
      PORT: 8000
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_REGION: ${S3_REGION:-us-east-1}
    volumes:
      - type: bind
        source: /path/on/host/for/crossbill/book-files
        target: /app/book-files
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - crossbill-network

  # Background job worker (SAQ) — processes async tasks like batch AI prereading generation.
  # Uses the same image as the app with a different entrypoint. Requires AI_PROVIDER config for AI tasks.
  worker:
    image: tumetsu/crossbill:latest
    container_name: crossbill-worker
    restart: unless-stopped
    pull_policy: always
    env_file: .env
    command: ["saq", "src.worker.worker_settings"]
    environment:
      DATABASE_URL: postgresql://crossbill:${POSTGRES_PASSWORD:-crossbill_secure_password}@postgres:5432/crossbill
      ENVIRONMENT: production
      AI_PROVIDER: ${AI_PROVIDER:-}
      AI_MODEL_NAME: ${AI_MODEL_NAME:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-5}
      S3_ENDPOINT_URL: ${S3_ENDPOINT_URL:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME:-}
      S3_REGION: ${S3_REGION:-us-east-1}
    volumes:
      - type: bind
        source: /path/on/host/for/crossbill/book-files
        target: /app/book-files
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - crossbill-network

  # Optional: S3-compatible object storage for shared file access between app and worker.
  # Not needed if using an external S3 service (e.g., Railway Object Storage, AWS S3).
  garage:
    image: dxflrs/garage:v2.2.0
    container_name: crossbill-garage
    restart: unless-stopped
    ports:
      - "3900:3900"  # S3 API
      - "3902:3902"  # Admin API
    volumes:
      - ./garage.toml:/etc/garage.toml:ro
      - garage_data:/var/lib/garage/data
      - garage_meta:/var/lib/garage/meta
    networks:
      - crossbill-network

volumes:
  postgres_data:
    driver: local
  garage_data:
    driver: local
  garage_meta:
    driver: local

networks:
  crossbill-network:
    driver: bridge
