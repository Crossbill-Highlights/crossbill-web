services:
  postgres:
    image: postgres:18-alpine
    container_name: crossbill-postgres-dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: crossbill
      POSTGRES_PASSWORD: crossbill_dev_password
      POSTGRES_DB: crossbill
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/18/docker
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crossbill"]
      interval: 10s
      timeout: 5s
      retries: 5

  garage:
    image: dxflrs/garage:v2.2.0
    container_name: crossbill-garage
    restart: unless-stopped
    ports:
      - "3900:3900"  # S3 API
      - "3901:3901"  # RPC (for garage CLI)
      - "3902:3902"  # Admin API
    volumes:
      - ../garage.toml:/etc/garage.toml:ro
      - garage_data:/var/lib/garage/data
      - garage_meta:/var/lib/garage/meta

volumes:
  postgres_data:
    driver: local
  garage_data:
  garage_meta:
